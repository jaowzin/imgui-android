name: Build Mamo libmain.so from ZIP

on:
  workflow_dispatch:
    inputs:
      zip_name:
        description: "Nome do ZIP no root. Use AUTO para escolher o MamoBall_CTF V mais recente valido."
        required: true
        default: "AUTO"
      abi:
        description: "ABI para build"
        required: true
        default: "arm64-v8a"
        type: choice
        options:
          - arm64-v8a
          - armeabi-v7a

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      ABI: ${{ github.event.inputs.abi }}
      ANDROID_PLATFORM: android-19
      NDK_VERSION: 23.1.7779620
      CMAKE_VERSION: 3.22.1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select ZIP
        shell: bash
        run: |
          set -euo pipefail

          ZIP_INPUT="${{ github.event.inputs.zip_name }}"
          echo "ZIP input: ${ZIP_INPUT}"
          echo "ABI: ${ABI}"

          if [ "${ZIP_INPUT}" = "AUTO" ]; then
          python3 - <<'PY' > selected_zip.txt
          import os
          import re
          import sys
          import zipfile

          root = os.environ["GITHUB_WORKSPACE"]
          abi = os.environ["ABI"]

          def version(name: str) -> int:
              m = re.findall(r"V(\d+)", name, flags=re.IGNORECASE)
              return int(m[-1]) if m else -1

          rows = []
          for name in os.listdir(root):
              if not name.lower().endswith(".zip"):
                  continue
              path = os.path.join(root, name)
              if not os.path.isfile(path):
                  continue

              has_cmake = False
              has_dobby = False
              try:
                  with zipfile.ZipFile(path) as z:
                      files = z.namelist()
                      has_cmake = any(f.endswith("app/src/main/jni/CMakeLists.txt") for f in files)
                      has_dobby = any(f.endswith(f"app/src/main/jni/Dobby/{abi}/libdobby.a") for f in files)
              except Exception as e:
                  print(f"ZIP invalido: {name}: {e}", file=sys.stderr)

              rows.append({
                  "name": name,
                  "version": version(name),
                  "mtime": os.path.getmtime(path),
                  "has_cmake": has_cmake,
                  "has_dobby": has_dobby,
                  "is_mamo": name.startswith("MamoBall_CTF"),
              })

          print("ZIPs encontrados:", file=sys.stderr)
          for r in sorted(rows, key=lambda x: (x["is_mamo"], x["version"], x["mtime"]), reverse=True):
              print(
                  f'  {r["name"]} | V={r["version"]} | cmake={r["has_cmake"]} | dobby_{abi}={r["has_dobby"]}',
                  file=sys.stderr,
              )

          valid = [r for r in rows if r["is_mamo"] and r["has_cmake"] and r["has_dobby"]]
          if not valid:
              valid = [r for r in rows if r["has_cmake"] and r["has_dobby"]]

          if not valid:
              print("ERRO: nenhum ZIP valido com CMakeLists.txt e Dobby para a ABI " + abi, file=sys.stderr)
              sys.exit(1)

          chosen = sorted(valid, key=lambda x: (x["version"], x["mtime"]), reverse=True)[0]["name"]
          print(chosen)
          PY
          ZIP_INPUT="$(cat selected_zip.txt)"
          fi

          ZIP_FILE="${GITHUB_WORKSPACE}/${ZIP_INPUT}"
          if [ ! -f "${ZIP_FILE}" ]; then
            echo "::error::ZIP nao encontrado: ${ZIP_FILE}"
            exit 1
          fi

          echo "ZIP selecionado: ${ZIP_INPUT}"
          echo "ZIP_FILE=${ZIP_FILE}" >> "${GITHUB_ENV}"

      - name: Extract ZIP
        shell: bash
        run: |
          set -euo pipefail

          rm -rf "${GITHUB_WORKSPACE}/_src" "${GITHUB_WORKSPACE}/_build" "${GITHUB_WORKSPACE}/out"
          mkdir -p "${GITHUB_WORKSPACE}/_src" "${GITHUB_WORKSPACE}/out"

          unzip -t "${ZIP_FILE}"
          unzip -q "${ZIP_FILE}" -d "${GITHUB_WORKSPACE}/_src"

          JNI_DIR="$(find "${GITHUB_WORKSPACE}/_src" -type f -path "*/app/src/main/jni/CMakeLists.txt" -printf "%h\n" | head -n 1)"
          if [ -z "${JNI_DIR}" ]; then
            echo "::error::Nao achei app/src/main/jni/CMakeLists.txt dentro do ZIP."
            find "${GITHUB_WORKSPACE}/_src" -maxdepth 6 -type f | sort | head -n 200
            exit 1
          fi

          echo "JNI_DIR=${JNI_DIR}" >> "${GITHUB_ENV}"
          echo "JNI_DIR: ${JNI_DIR}"

          if [ ! -f "${JNI_DIR}/Dobby/${ABI}/libdobby.a" ]; then
            echo "::error::Nao achei Dobby/${ABI}/libdobby.a dentro do ZIP selecionado."
            echo "Dobby encontrados:"
            find "${JNI_DIR}/Dobby" -type f -name "libdobby.a" -print || true
            exit 1
          fi

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install NDK and CMake
        shell: bash
        run: |
          set -euo pipefail
          sdkmanager --install \
            "platform-tools" \
            "ndk;${NDK_VERSION}" \
            "cmake;${CMAKE_VERSION}"
          yes | sdkmanager --licenses >/dev/null || true
          sudo apt-get update
          sudo apt-get install -y ninja-build
          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/${NDK_VERSION}" >> "${GITHUB_ENV}"
          echo "${ANDROID_SDK_ROOT}/cmake/${CMAKE_VERSION}/bin" >> "${GITHUB_PATH}"

      - name: Configure CMake
        shell: bash
        run: |
          set -euo pipefail
          cmake \
            -S "${JNI_DIR}" \
            -B "${GITHUB_WORKSPACE}/_build/${ABI}" \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="${ANDROID_NDK_HOME}/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI="${ABI}" \
            -DANDROID_PLATFORM="${ANDROID_PLATFORM}" \
            -DANDROID_STL=c++_static \
            -DCMAKE_LIBRARY_OUTPUT_DIRECTORY="${GITHUB_WORKSPACE}/out/${ABI}"

      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          cmake --build "${GITHUB_WORKSPACE}/_build/${ABI}" --config Release -- -v

      - name: Collect libmain.so
        shell: bash
        run: |
          set -euo pipefail

          echo "SO geradas:"
          find "${GITHUB_WORKSPACE}/_build/${ABI}" "${GITHUB_WORKSPACE}/out/${ABI}" -type f -name "*.so" -print || true

          LIB_PATH="$(find "${GITHUB_WORKSPACE}/out/${ABI}" "${GITHUB_WORKSPACE}/_build/${ABI}" -type f -name "libmain.so" | head -n 1 || true)"

          if [ -z "${LIB_PATH}" ]; then
            echo "::error::libmain.so nao foi gerada."
            exit 1
          fi

          cp -v "${LIB_PATH}" "${GITHUB_WORKSPACE}/out/libmain.so"
          cp -v "${LIB_PATH}" "${GITHUB_WORKSPACE}/out/libmain-${ABI}.so"
          ls -lh "${GITHUB_WORKSPACE}/out/libmain.so" "${GITHUB_WORKSPACE}/out/libmain-${ABI}.so"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libmain-${{ env.ABI }}
          path: |
            out/libmain.so
            out/libmain-${{ env.ABI }}.so
          if-no-files-found: error
